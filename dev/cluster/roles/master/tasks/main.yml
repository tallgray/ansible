---
- name: Install Docker and Kubernetes components on master node
  package:
    name: "{{ item }}"
    state: present
  loop:
    - docker.io
    - kubeadm
    - kubelet
    - kubectl
  tags: master

- name: Initialize Kubernetes master
  command: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address="{{ ansible_host }}"
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeadm_init_output
  tags: master

- name: Configure kubectl for master
  template:
    src: templates/kube-config.j2
    dest: /home/ubuntu/.kube/config
  tags: master
