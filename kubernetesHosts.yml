---
- hosts: kubernetes
  gather_facts: false
  become: true
  vars:
    container_count: 1
    default_container_image: ubuntu
    terraform_version: latest
    terraform_pkg_url: "https://releases.hashicorp.com/terraform/{{terraform_version}}/terraform_{{TERRAFORM_VERSION}}_linux_amd64.zip"
    terraform_path: /usr/bin
    default_container_command: sleep 1d
    default_container_name: "my{{ default_container_image }}"

  tasks:
    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: download helm
      unarchive:
        src: "https://get.helm.sh/helm-v3.5.4-linux-amd64.tar.gz"
        remote_src: yes
        dest: /tmp
      notify:
        - install helm

    - name: Install required system packages
      package:
        name:
          - unzip
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - docker-compose
        state: latest
        update_cache: true

    - name: Install Docker Module for Python
      pip:
        name: docker

    - name: Pull Docker image
      community.docker.docker_image:
        name: "{{ default_container_image }}"
        source: pull

    - name: Create Docker containers
      community.docker.docker_container:
        name: "{{ default_container_name }}"
        image: "{{ default_container_image }}"
        command: "{{ default_container_command }}"
        state: present
      with_sequence: count={{ container_count }}

    - name: install minikube
      apt:
        deb: "https://storage.googleapis.com/minikube/releases/latest/minikube_latest_amd64.deb"
        state: present

    - name: install kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.21.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

  handlers:
    - name: install helm
      copy:
        src: /tmp/linux-amd64/helm
        remote_src: yes
        dest: /usr/local/bin/helm
        mode: "0755"