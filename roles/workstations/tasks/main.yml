- name: Install semaphore
  snap:
    name: semaphore

- name: Install unzip
  package:
    name: unzip

- name: Install terraform
  unarchive:
    src: https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip
    dest: /usr/local/bin
    remote_src: yes
    mode: 0755
    owner: root
    group: root
