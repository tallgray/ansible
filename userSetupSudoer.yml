---
- hosts: all
  gather_facts: true
  become: true
  vars:
    create_username: "{{ user }}"
    password: $6$hWLIHdbKYlUGXMes$dk//saWhiHfhp43lQ8m0L851FYCQeg8ZCnC7h/8MZ4ilWl87CGSoOlQcF1UWC0kMyk5oiV8vHSbX2TQyFEFGU.

  tasks:
    - name: Setup passwordless sudo
      lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL) NOPASSWD: ALL'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Create a new regular user with sudo privileges in Ubuntu
      user:
        name: "{{ create_username }}"
        password: "{{ password }}"
        state: present
        groups: sudo
        append: true
        create_home: true
      when: ansible_distribution == "Ubuntu"

    - name: Create a new regular user with sudo privileges in RHEL
      user:
        name: "{{ create_username }}"
        password: "{{ password }}"
        state: present
        groups: wheel
        append: true
        create_home: true
      when: ansible_distribution == "RedHat"

    - name: Set authorized key for remote user
      ansible.posix.authorized_key:
        user: "{{ create_username }}"
        state: present
        key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_{{ create_username }}.pub') }}"

    - name: Disable password authentication for root
      lineinfile:
        path: /etc/ssh/sshd_config
        state: present
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
